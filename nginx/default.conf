upstream api_upstream {
    server api:5000;
    keepalive 32;
}

upstream web_upstream {
    server web:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;

    # --- API ---
    location /api/ {
        proxy_pass http://api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";          # enable keepalive to upstream

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;
    }

    # --- Web (Next.js / React / Vite) ---
    location / {
        proxy_pass http://web_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers     8 16k;
    }

    # Next.js HMR websocket (dev only — remove in production)
    location /_next/webpack-hmr {
        proxy_pass http://web_upstream/_next/webpack-hmr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # Static asset caching
    location /_next/static/ {
        proxy_pass http://web_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block common attack probes
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
}
